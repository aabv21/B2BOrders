service: b2b-orders-orchestrator

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, "dev"}
  region: us-east-1
  memorySize: 512
  timeout: 30
  environment:
    CUSTOMERS_API_BASE: https://1e4d208945fe.ngrok-free.app
    ORDERS_API_BASE: https://1e4d208945fe.ngrok-free.app
    SERVICE_TOKEN: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzZXJ2aWNlIjoib3JkZXJzLWFwaSIsInB1cnBvc2UiOiJpbnRlcm5hbC1jb21tdW5pY2F0aW9uIiwiaWF0IjoxNzYwNzYwNzQyfQ.Dlzy3GGGNt9jiglZHFAMSZzQCUnmkqUO__KM9Z3Ou5s
    DEV_TOKEN: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEsImVtYWlsIjoiYWRtaW5AZXhhbXBsZS5jb20iLCJuYW1lIjoiQWRtaW4gVXNlciIsInJvbGUiOiJhZG1pbiIsImlhdCI6MTc2MDc2MDc0Mn0.8K7nFk5LJKyDFNUlc-bdZPkKMVNH7CtfQ1ttchP0eaM
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "arn:aws:logs:*:*:*"

package:
  individually: false
  patterns:
    - '!tests/**'
    - '!*.test.js'
    - '!.git/**'
    - '!.serverless/**'
    - '!.env'
    - '!src/**'
    - '!handler.js'

functions:
  createAndConfirmOrder:
    handler: handler.createAndConfirmOrder
    description: Orchestrates order creation and confirmation - validates customer, creates order, confirms order
    events:
      - httpApi:
          path: /orchestrator/create-and-confirm-order
          method: post
    environment:
      NODE_ENV: production

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    platform: node
    format: cjs
    external: []

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3003
    noPrependStageInUrl: true
